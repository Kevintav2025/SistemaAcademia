<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iron Pro Store - Oficial</title>
    <style>
        :root {
            --primaria: #f39c12; 
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --foto-bg: #252525; 
            --texto: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { 
            background-color: var(--bg); 
            color: var(--texto); 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .loja-container { 
            width: 100%;
            max-width: 1200px; 
        }

        .header-loja {
            margin-bottom: 30px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .header-loja h1 span { color: var(--primaria); }

        .grid-produtos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .card-produto {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--primaria); 
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        .card-produto:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.2);
        }

        .tag-produto {
            background: var(--primaria);
            color: black;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 4px;
            align-self: flex-start;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .foto-container {
            background: var(--foto-bg);
            width: 100%;
            height: 230px; 
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .foto-container img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .marca-item { color: var(--primaria); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }
        .nome-item { font-size: 1.1rem; margin: 5px 0 10px; font-weight: 500; min-height: 45px; }
        .preco-item { font-size: 1.8rem; font-weight: bold; margin-bottom: 15px; }

        .btn-comprar {
            background: var(--primaria);
            color: black;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-comprar:hover { background: #e67e22; }

        .cart-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--primaria);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }

        .cart-count {
            position: absolute;
            top: 0;
            right: 5px;
            background: white;
            color: black;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="loja-container">
        <header class="header-loja">
            <h1>Iron <span>Pro</span> Store</h1>
            <p style="color: #888;">Vitrine Oficial de Suplementos</p>
        </header>

        <main class="grid-produtos">
            
            <div class="card-produto">
                <div class="tag-produto">BEST SELLER</div>
                <div class="foto-container">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTzME2Wr0yZWr8QiNOsAtaelF6dJUljuOvh6mvWDgSbDA2GgW-sRIFZQzc&s=10" alt="Whey Iron Pro">
                </div>
                <span class="marca-item">IRON PRO NUTRITION</span>
                <h3 class="nome-item">Whey Protein Isolado (900g)</h3>
                <span class="preco-item">R$ 189,90</span>
                <button class="btn-comprar" onclick="add()">Comprar Agora</button>
            </div>

            <div class="card-produto">
                <div class="tag-produto">PURO 100%</div>
                <div class="foto-container">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRBn00MRYw2neE2vzmn81y8YZ9nbfvrYL548Q&s" alt="Creatina Iron Pro">
                </div>
                <span class="marca-item">IRON PRO NUTRITION</span>
                <h3 class="nome-item">Creatina Monohidratada (300g)</h3>
                <span class="preco-item">R$ 95,00</span>
                <button class="btn-comprar" onclick="add()">Comprar Agora</button>
            </div>

            <div class="card-produto">
                <div class="tag-produto">QUEIMA MÁXIMA</div>
                <div class="foto-container">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSj9exnT6mKrsqA6vBmw0Oes3eYv9PiDp4LuPp8-roUfA&s=10" alt="Termogênico Iron Pro">
                </div>
                <span class="marca-item">IRON PRO NUTRITION</span>
                <h3 class="nome-item">Termogênico Fire Max (60 caps)</h3>
                <span class="preco-item">R$ 88,00</span>
                <button class="btn-comprar" onclick="add()">Comprar Agora</button>
            </div>

        </main>
    </div>

    <div class="cart-float">
        🛒
        <div class="cart-count" id="count">0</div>
    </div>

    <script>
        let counter = 0;
        function add() {
            counter++;
            document.getElementById('count').innerText = counter;
        }
    </script>

</body>
</html>
