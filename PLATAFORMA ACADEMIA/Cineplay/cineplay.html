<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>CinePlay</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #020617, #0f172a);
      color: #fff;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    header h1 {
      font-size: 2rem;
      color: #22c55e;
    }

    header p {
      margin-top: 5px;
      color: #cbd5f5;
    }

    .search {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .search input {
      padding: 12px;
      width: 280px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    .search button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      font-weight: bold;
      cursor: pointer;
    }

    .search button:hover {
      background: #16a34a;
    }

    .movies {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .movie {
      background: #020617;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s;
    }

    .movie:hover {
      transform: scale(1.05);
    }

    .movie img {
      width: 100%;
      height: 225px;
      object-fit: cover;
    }

    .movie h3 {
      font-size: 14px;
      padding: 10px;
      text-align: center;
    }

    .message {
      text-align: center;
      padding: 20px;
      color: #f87171;
    }

    footer {
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.6rem;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>🎬 CinePlay</h1>
  <p>Plataforma de filmes </p>
</header>

<div class="search">
  <input type="text" id="searchInput" placeholder="Digite o nome do filme">
  <button onclick="buscarFilmes()">Pesquisar</button>
</div>

<div id="mensagem" class="message"></div>
<div class="movies" id="movies"></div>

<footer>
  Dados fornecidos por TMDB
</footer>

<script>
  const API_KEY = "e4d1d03ae5a55739bf7f399256678ef8";
  const BASE_URL = "https://api.themoviedb.org/3";
  const IMG_URL = "https://image.tmdb.org/t/p/w500";

  async function buscarFilmes() {
    const query = document.getElementById("searchInput").value.trim();
    const moviesDiv = document.getElementById("movies");
    const mensagem = document.getElementById("mensagem");

    moviesDiv.innerHTML = "";
    mensagem.innerText = "";

    if (!query) {
      mensagem.innerText = "Digite o nome de um filme.";
      return;
    }

    try {
      const response = await fetch(
        `${BASE_URL}/search/movie?api_key=${API_KEY}&query=${query}&language=pt-BR`
      );

      const data = await response.json();

      if (!data.results || data.results.length === 0) {
        mensagem.innerText = "❌ Filme não encontrado.";
        return;
      }

      data.results.forEach(filme => {
        const poster = filme.poster_path
          ? IMG_URL + filme.poster_path
          : "https://via.placeholder.com/300x450?text=Sem+Imagem";

        moviesDiv.innerHTML += `
          <div class="movie">
            <img src="${poster}" alt="${filme.title}">
            <h3>${filme.title}</h3>
          </div>
        `;
      });

    } catch (erro) {
      mensagem.innerText = "⚠️ Erro ao carregar filmes.";
      console.error(erro);
    }
  }
</script>

</body>
</html>
